<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sen's World</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
  <!-- 粒子背景容器 -->
  <div id="particles-js" style="position: fixed; top:0; left:0; width:100%; height:100%; z-index: -1;"></div>

  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">Sen's World</a>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="posts.html">Posts</a>
        <a href="loves.html">Loves</a>
        <a href="archives.html">Archives</a>
        <a href="search.html">Search</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main class="home" style="position: relative; z-index: 1;">
    <img src="avatar.png" alt="Avatar" class="avatar">
    <h1>Sen's World</h1>
    <p class="tagline">祝麻麻母亲节快乐 💐</p>
    <div class="social">
      <a href="https://github.com/yitumulin" target="_blank">GitHub</a>
      <a href="mailto:hi@yitumulin.com">Email</a>
    </div>
    <div class="links">
      <a href="about.html" class="btn">About</a>
      <a href="posts.html" class="btn">Posts</a>
      <a href="loves.html" class="btn">Loves</a>
    </div>
  </main>

  <footer class="site-footer">
    <p>© 2025 Sen Wang</p>
  </footer>

  <!-- 引入粒子库 -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

  <!-- 粒子配置 -->
  <script>
    particlesJS("particles-js", {
      "particles": {
        "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
        "color": { "value": "#ffffff" },
        "shape": { "type": "circle" },
        "opacity": { "value": 0.5 },
        "size": { "value": 3 },
        "line_linked": { "enable": true, "distance": 120, "color": "#ffffff", "opacity": 0.4, "width": 1 },
        "move": { "enable": true, "speed": 2 }
      },
      "interactivity": {
        "detect_on": "canvas",
        "events": {
          "onhover": { "enable": true, "mode": "grab" },
          "onclick": { "enable": true, "mode": "push" },
          "resize": true
        }
      },
      "retina_detect": true
    });
  </script>
</body>
</html>
