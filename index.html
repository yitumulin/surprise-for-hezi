<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给禾子涵的惊喜</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
            max-width: 800px;
            margin: 20px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 1rem;
        }
        .message {
            font-size: 1.2rem;
            color: #34495e;
            margin: 1rem 0;
            line-height: 1.6;
        }
        .heart {
            color: #e74c3c;
            font-size: 2rem;
            animation: heartbeat 1.5s infinite;
        }
        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .button {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            margin: 10px;
            transition: all 0.3s ease;
        }
        .button:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>亲爱的禾子涵 <span class="heart">❤</span></h1>
        <div class="message">
            考试加油！我相信你一定可以做到最好！
        </div>
        <div class="message">
            记住，无论结果如何，你都是最棒的！
        </div>
        <button class="button" onclick="showSurprise()">点击查看惊喜</button>
        <div id="surprise" class="hidden">
            <div class="message">
                这里有一些放松的音乐，希望可以帮助你缓解压力：
            </div>
            <iframe width="560" height="315" src="https://www.youtube.com/embed/jfKfPfyJRdk" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        function showSurprise() {
            document.getElementById('surprise').classList.remove('hidden');
        }
    </script>
</body>
</html>
